name: Deploy Auth Service (Fly)

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - "fly.toml"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        run: flyctl apps create auth-service-rodmen07-v2 || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
