name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Run tests with coverage
        run: PYTHONPATH=. pytest -q --cov=app --cov-report=term-missing --cov-report=xml

      - name: Audit dependencies for known vulnerabilities
        # Informational: surfaces PyPI advisories in CI without breaking
        # unrelated PRs when upstream publishes a new advisory. Triage findings
        # and bump pinned versions in requirements.txt as fixes become available.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --desc

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: auth-service
